name: Build pyvoro wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      make_release:
        type: boolean
        default: false
      version:
        required: true
  pull_request:

jobs:
  build:
    name: ${{ matrix.os }} - Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Upgrade pip
        run: python -m pip install -U pip setuptools wheel build cython scikit-build-core

      # ---------- Linux deps ----------
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libeigen3-dev libgmp-dev

      # ---------- macOS deps ----------
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install cmake

      # ---------- Windows deps ----------
      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: |
          choco install cmake -y

      - name: Build universal wheel (macOS)
        if: runner.os == 'macOS'
        env:
          ARCHFLAGS: "-arch arm64 -arch x86_64"
          CMAKE_OSX_ARCHITECTURES: "arm64;x86_64"
          CMAKE_OSX_DEPLOYMENT_TARGET: "10.12"
          CMAKE_ARGS: "-DCYTHONIZE=ON"
        run: |
          python -m pip install .
          rm -rf build dist
          python -m build --wheel --no-isolation

      - name: Build wheel (other OS)
        if: runner.os != 'macOS'
        env:
          CMAKE_ARGS: "-DCYTHONIZE=ON"
        run: |
          python -m pip install .
          python -m build --wheel --no-isolation

      # ---------- Upload artifacts ----------
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: pyvoro-${{ matrix.os }}-py${{ matrix.python }}
          path: dist/*.whl


  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.make_release == 'true' }}

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten
        run: |
          mkdir release
          find dist -name "*.whl" -exec mv {} release/ \;

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: PyVoro v${{ steps.version.outputs.version }}
          files: release/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
