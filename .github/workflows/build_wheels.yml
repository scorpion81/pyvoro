name: Build pyvoro wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
  pull_request:

jobs:
  build:
    name: ${{ matrix.os }} - Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Upgrade pip
        run: python -m pip install -U pip setuptools wheel build cython scikit-build-core

      # ---------- Linux deps ----------
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libeigen3-dev libgmp-dev

      # ---------- macOS deps ----------
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install cmake

      # ---------- Windows deps ----------
      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: |
          choco install cmake -y

      - name: Build universal wheel (macOS)
        if: runner.os == 'macOS'
        env:
          CMAKE_OSX_ARCHITECTURES: "x86_64;arm64"
          CMAKE_ARGS: "-DCYTHONIZE=ON"
        run: |
          python -m pip install .
          rm -rf build dist
          python -m build --wheel --no-isolation

      - name: Build wheel (other OS)
        if: runner.os != 'macOS'
        env:
          CMAKE_ARGS: "-DCYTHONIZE=ON"
        run: |
          python -m pip install .
          python -m build --wheel --no-isolation

      # ---------- Upload artifacts ----------
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: pyvoro-${{ matrix.os }}-py${{ matrix.python }}
          path: dist/*.whl


  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir release
          find dist -name "*.whl" -exec cp {} release/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.whl